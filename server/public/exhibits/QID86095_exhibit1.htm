<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Responsive Medical Table</title>

<style>
.table-wrapper {
    width: 100%;
    max-width: 100%;
    overflow-x: auto;
    margin: 10px auto;
}

.med-table {
    border-collapse: collapse;
    width: auto;
    max-width: 100%;
    font-family: Arial, Helvetica, sans-serif;
    margin: 10px auto;
    font-size: 15px;
    line-height: 1.35;
    white-space: normal;
}

.med-table th {
    background-color: #a0bfe470;
    padding: 6px 10px;
    border: 1px solid #ddd;
    text-align: left;
    font-weight: 700;
    vertical-align: top;
}

.med-table td {
    padding: 6px 10px;
    border: 1px solid #ddd;
    text-align: left;
    vertical-align: top;
}

/* Chessboard pattern */
.med-table tbody tr:nth-child(odd) td:nth-child(odd),
.med-table tbody tr:nth-child(even) td:nth-child(even) {
    background-color: #e0ecfe8e;
}

.med-table tbody tr:nth-child(odd) td:nth-child(even),
.med-table tbody tr:nth-child(even) td:nth-child(odd) {
    background-color: #ffffff;
}

@media screen and (max-width: 600px) {
    .med-table {
        font-size: 14px;
    }

    .med-table th,
    .med-table td {
        padding: 5px 7px;
    }
}
</style>
</head>

<body>

<div class="table-wrapper">
<table class="med-table">
<thead>
<tr>
<th colspan="2">Lab Reference Ranges</th>
</tr>
</thead>

<tbody>
<tr>
<th>Test</th>
<th>Reference Range</th>
</tr>
<tr>
<td>24-hour urine protein</td>
<td>&lt;300 mg</td>
</tr>
<tr>
<td>WBCs</td>
<td>Pregnancy: 5000-15,000/mm&sup3;<br>(5-15 &times; 10<sup>9</sup>/L)</td>
</tr>
<tr>
<td>1-hour oral glucose challenge test</td>
<td>&lt;140 mg/dL<br>(7.8 mmol/L)</td>
</tr>
<tr>
<td>Hemoglobin</td>
<td>Pregnancy: 12-16 g/dL<br>(120-160 g/L)</td>
</tr>
</tbody>
</table>
</div>

</body>
</html>
