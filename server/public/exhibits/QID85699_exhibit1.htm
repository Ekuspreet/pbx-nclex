<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Responsive Medical Table</title>

<style>
.table-wrapper {
    width: 100%;
    max-width: 100%;
    overflow-x: auto;
    margin: 10px auto;
}

.med-table {
    border-collapse: collapse;
    width: auto;
    max-width: 100%;
    font-family: Arial, Helvetica, sans-serif;
    margin: 10px auto;
    font-size: 15px;
    line-height: 1.35;
    white-space: normal;
}

.med-table th {
    background-color: #a0bfe470;
    padding: 6px 10px;
    border: 1px solid #ddd;
    text-align: left;
    font-weight: 700;
    vertical-align: top;
}

.med-table td {
    padding: 6px 10px;
    border: 1px solid #ddd;
    text-align: left;
    vertical-align: top;
}

.med-table tbody tr:nth-child(odd) td:nth-child(odd),
.med-table tbody tr:nth-child(even) td:nth-child(even) {
    background-color: #e0ecfe8e;
}

.med-table tbody tr:nth-child(odd) td:nth-child(even),
.med-table tbody tr:nth-child(even) td:nth-child(odd) {
    background-color: #ffffff;
}

@media screen and (max-width: 600px) {
    .med-table {
        font-size: 14px;
    }

    .med-table th,
    .med-table td {
        padding: 5px 7px;
    }
}
</style>
</head>

<body>

<div class="table-wrapper">
<table class="med-table">
<thead>
<tr>
<th colspan="2">Lab Reference Ranges</th>
</tr>
</thead>

<tbody>
<tr>
<th>Laboratory Test</th>
<th>Reference Range</th>
</tr>
<tr>
<td>Glucose (fasting)</td>
<td>70–110 mg/dL<br>(3.9–6.1 mmol/L)</td>
</tr>
<tr>
<td>Triglycerides</td>
<td>Male: 40–160 mg/dL<br>(0.45–1.81 mmol/L)<br><br>Female: 35–135 mg/dL<br>(0.4–1.52 mmol/L)</td>
</tr>
<tr>
<td>HDL</td>
<td>Male: &gt;45 mg/dL<br>(&gt;0.75 mmol/L)<br><br>Female: &gt;55 mg/dL<br>(&gt;0.91 mmol/L)</td>
</tr>
</tbody>
</table>
</div>

</body>
</html>
