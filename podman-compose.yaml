services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: pbx-nclex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pbx_nclex}
      POSTGRES_USER: ${POSTGRES_USER:-pbx_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pbx_password}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Containerfile
    container_name: pbx-nclex-server
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER:-pbx_user}:${POSTGRES_PASSWORD:-pbx_password}@postgres:5432/${POSTGRES_DB:-pbx_nclex}
      CLIENT_URL: ${CLIENT_URL:-http://drac.ooguy.com}
      ADMIN_URL: ${ADMIN_URL:-http://admin.drac.ooguy.com}
      SERVER_URL: ${SERVER_URL:-http://api.drac.ooguy.com}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-change-me-access-token-secret}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-15m}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-change-me-refresh-token-secret}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-30d}
      ACCESS_COOKIE_NAME: ${ACCESS_COOKIE_NAME:-access_token}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-refresh_token}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      OTP_EXPIRES_IN_MINUTES: ${OTP_EXPIRES_IN_MINUTES:-10}
      OTP_RESEND_COOLDOWN_SECONDS: ${OTP_RESEND_COOLDOWN_SECONDS:-60}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      PASSWORD_RESET_EXPIRES_IN_MINUTES: ${PASSWORD_RESET_EXPIRES_IN_MINUTES:-15}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin-password}
      ADMIN_TOKEN_SECRET: ${ADMIN_TOKEN_SECRET:-change-me-admin-token-secret}
      ADMIN_COOKIE_NAME: ${ADMIN_COOKIE_NAME:-admin_access_token}
      ADMIN_TOKEN_EXPIRES_IN: ${ADMIN_TOKEN_EXPIRES_IN:-12h}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-PBX NCLEX}
      GOOGLE_MAIL_USER: ${GOOGLE_MAIL_USER:-}
      GOOGLE_MAIL_CLIENT_ID: ${GOOGLE_MAIL_CLIENT_ID:-}
      GOOGLE_MAIL_CLIENT_SECRET: ${GOOGLE_MAIL_CLIENT_SECRET:-}
      GOOGLE_MAIL_REFRESH_TOKEN: ${GOOGLE_MAIL_REFRESH_TOKEN:-}
      APP_NAME: ${APP_NAME:-PBX NCLEX}
    ports:
      - "127.0.0.1:${SERVER_PORT:-5000}:5000"

  client:
    build:
      context: ./client
      dockerfile: Containerfile
      args:
        VITE_API_BASE_URL: ${CLIENT_VITE_API_BASE_URL:-/api/v1}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: pbx-nclex-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "127.0.0.1:${CLIENT_PORT:-8080}:80"

  admin:
    build:
      context: .
      dockerfile: admin/Containerfile
      args:
        VITE_API_BASE_URL: ${ADMIN_VITE_API_BASE_URL:-/api/v1}
    container_name: pbx-nclex-admin
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "127.0.0.1:${ADMIN_PORT:-8081}:80"

  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Containerfile
    container_name: pbx-nclex-nginx
    restart: unless-stopped
    depends_on:
      - client
      - admin
      - server
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  postgres_data:
