<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Responsive Medical Table</title>

<style>
.table-wrapper {
    width: 100%;
    max-width: 100%;
    overflow-x: auto;
    margin: 10px auto;
}

.med-table {
    border-collapse: collapse;
    width: auto;
    max-width: 100%;
    font-family: Arial, Helvetica, sans-serif;
    margin: 10px auto;
    font-size: 15px;
    line-height: 1.35;
    white-space: normal;
}

.med-table th {
    background-color: #a0bfe470;
    padding: 6px 10px;
    border: 1px solid #ddd;
    text-align: left;
    font-weight: 700;
    vertical-align: top;
}

.med-table td {
    padding: 6px 10px;
    border: 1px solid #ddd;
    text-align: left;
    vertical-align: top;
}

/* Chessboard pattern */
.med-table tbody tr:nth-child(odd) td:nth-child(odd),
.med-table tbody tr:nth-child(even) td:nth-child(even) {
    background-color: #e0ecfe8e;
}

.med-table tbody tr:nth-child(odd) td:nth-child(even),
.med-table tbody tr:nth-child(even) td:nth-child(odd) {
    background-color: #ffffff;
}

@media screen and (max-width: 600px) {
    .med-table {
        font-size: 14px;
    }

    .med-table th,
    .med-table td {
        padding: 5px 7px;
    }
}
</style>
</head>

<body>

<div class="table-wrapper">
<table class="med-table">
<thead>
<tr>
<th colspan="3">Lab Results</th>
</tr>
</thead>

<tbody>
<tr>
<td colspan="3"><strong>Specimen type:</strong> Midstream Urine</td>
</tr>
<tr>
<th>Test</th>
<th>Reference Range</th>
<th>Result</th>
</tr>
<tr>
<td>Specific gravity</td>
<td>1.005-1.030</td>
<td>1.033</td>
</tr>
<tr>
<td>Protein</td>
<td>0-8 mg/dL</td>
<td>None</td>
</tr>
<tr>
<td>Color</td>
<td>Pale to amber yellow</td>
<td>Amber</td>
</tr>
<tr>
<td>Glucose (random)</td>
<td>Not present</td>
<td>Not present</td>
</tr>
<tr>
<td>RBC</td>
<td>&lt;2</td>
<td>None</td>
</tr>
<tr>
<td>WBC</td>
<td>0-4 per high power field</td>
<td>None</td>
</tr>
</tbody>
</table>
</div>

</body>
</html>
