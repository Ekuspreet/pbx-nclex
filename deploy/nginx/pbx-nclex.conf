# Host nginx reverse proxy for PBX NCLEX.
#
# Run the app containers with podman-compose.yaml, then install this file into
# your host nginx config, for example:
#   /etc/nginx/sites-available/pbx-nclex.conf
#
# Public traffic is served from one domain:
#   /         -> 127.0.0.1:8080  client container
#   /admin/   -> 127.0.0.1:8081  admin container
#   /api/v1/  -> 127.0.0.1:5000  API container
#   /public/  -> 127.0.0.1:5000  API static assets

upstream pbx_nclex_client {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream pbx_nclex_admin {
    server 127.0.0.1:8081;
    keepalive 32;
}

upstream pbx_nclex_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.example;

    client_max_body_size 20m;

    location = /api/v1 {
        proxy_pass http://pbx_nclex_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ {
        proxy_pass http://pbx_nclex_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /public/ {
        proxy_pass http://pbx_nclex_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 308 /admin/;
    }

    location /admin/ {
        proxy_pass http://pbx_nclex_admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://pbx_nclex_client;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
