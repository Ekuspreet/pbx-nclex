<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Responsive Medical Table</title>

<style>
.table-wrapper {
    width: 100%;
    max-width: 100%;
    overflow-x: auto;
    margin: 10px auto;
}

.med-table {
    border-collapse: collapse;
    width: auto;
    max-width: 100%;
    font-family: Arial, Helvetica, sans-serif;
    margin: 10px auto;
    font-size: 15px;
    line-height: 1.35;
    white-space: normal;
}

.med-table th {
    background-color: #a0bfe470;
    padding: 6px 10px;
    border: 1px solid #ddd;
    text-align: left;
    font-weight: 700;
    vertical-align: top;
}

.med-table td {
    padding: 6px 10px;
    border: 1px solid #ddd;
    text-align: left;
    vertical-align: top;
}

/* Chessboard pattern */
.med-table tbody tr:nth-child(odd) td:nth-child(odd),
.med-table tbody tr:nth-child(even) td:nth-child(even) {
    background-color: #e0ecfe8e;
}

.med-table tbody tr:nth-child(odd) td:nth-child(even),
.med-table tbody tr:nth-child(even) td:nth-child(odd) {
    background-color: #ffffff;
}

@media screen and (max-width: 600px) {
    .med-table {
        font-size: 14px;
    }

    .med-table th,
    .med-table td {
        padding: 5px 7px;
    }
}
</style>
</head>

<body>

<div class="table-wrapper">
<table class="med-table">
<thead>
<tr>
<th colspan="3">Lab Results</th>
</tr>
</thead>

<tbody>
<tr>
<th>Test</th>
<th>Reference Range</th>
<th>Result</th>
</tr>
<tr>
<td>Serum albumin</td>
<td>3.5-5.0 g/dL<br>(35-50 g/L)</td>
<td>2.2 g/dL<br>(22 g/L)</td>
</tr>
<tr>
<td>Serum total cholesterol</td>
<td>&lt;200 mg/dL<br>(&lt;5.2 mmol/L)</td>
<td>283 mg/dL<br>(7.32 mmol/L)</td>
</tr>
<tr>
<td>Urinalysis, protein</td>
<td>Not present</td>
<td>3+</td>
</tr>
</tbody>
</table>
</div>

</body>
</html>
