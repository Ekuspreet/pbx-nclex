<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Responsive Medical Table</title>

<style>
.table-wrapper {
    width: 100%;
    max-width: 100%;
    overflow-x: auto;
    margin: 10px auto;
}

.med-table {
    border-collapse: collapse;
    width: auto;
    max-width: 100%;
    font-family: Arial, Helvetica, sans-serif;
    margin: 10px auto;
    font-size: 15px;
    line-height: 1.35;
    white-space: normal;
}

.med-table th {
    background-color: #a0bfe470;
    padding: 6px 10px;
    border: 1px solid #ddd;
    text-align: left;
    font-weight: 700;
    vertical-align: top;
}

.med-table td {
    padding: 6px 10px;
    border: 1px solid #ddd;
    text-align: left;
    vertical-align: top;
}

/* Chessboard pattern */
.med-table tbody tr:nth-child(odd) td:nth-child(odd),
.med-table tbody tr:nth-child(even) td:nth-child(even) {
    background-color: #e0ecfe8e;
}

.med-table tbody tr:nth-child(odd) td:nth-child(even),
.med-table tbody tr:nth-child(even) td:nth-child(odd) {
    background-color: #ffffff;
}

@media screen and (max-width: 600px) {
    .med-table {
        font-size: 14px;
    }

    .med-table th,
    .med-table td {
        padding: 5px 7px;
    }
}
</style>
</head>

<body>

<div class="table-wrapper">
<table class="med-table">
<thead>
<tr>
<th colspan="2">Lab Reference Ranges</th>
</tr>
</thead>

<tbody>
<tr>
<th>Laboratory Test</th>
<th>Normal Reference Range</th>
</tr>
<tr>
<td><strong>Troponin T</strong></td>
<td>&lt;0.1 ng/mL<br>(&lt;0.1 mcg/L)</td>
</tr>
<tr>
<td><strong>Sodium</strong></td>
<td>136-145 mEq/L<br>(136-145 mmol/L)</td>
</tr>
<tr>
<td><strong>BUN</strong></td>
<td>10–20 mg/dL<br>(3.6–7.1 mmol/L)</td>
</tr>
<tr>
<td><strong>Magnesium</strong></td>
<td>1.3–2.1 mEq/L<br>(0.65–1.05 mmol/L)</td>
</tr>
</tbody>
</table>
</div>

</body>
</html>
