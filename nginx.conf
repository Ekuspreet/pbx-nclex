server {
    listen 80;
    server_name _;

    # Built Vite client/admin app.
    root /usr/share/nginx/html;
    index index.html;

    # API requests stay same-origin in the browser and are proxied to Express.
    location /api/v1/ {
        proxy_pass http://server:5000/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public server-managed assets such as downloaded images.
    location /public/ {
        proxy_pass http://server:5000/public/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router handles learner and admin routes, including /admin/...
    location / {
        try_files $uri $uri/ /index.html;
    }
}
