services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: pbx-nursing-postgres
    restart: unless-stopped
    env_file:
      - ./postgres/.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Containerfile
    container_name: pbx-nursing-server
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./server/.env
    ports:
      - "127.0.0.1:5000:5000"

  client:
    build:
      context: .
      dockerfile: client/Containerfile
    container_name: pbx-nursing-client
    restart: unless-stopped
    depends_on:
      - server
    env_file:
      - ./client/.env
    ports:
      - "8080:80"

volumes:
  postgres_data:
