<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Responsive Medical Table</title>

<style>
.table-wrapper {
    width: 100%;
    max-width: 100%;
    overflow-x: auto;
    margin: 10px auto;
}

.med-table {
    border-collapse: collapse;
    width: auto;
    max-width: 100%;
    font-family: Arial, Helvetica, sans-serif;
    margin: 10px auto;
    font-size: 15px;
    line-height: 1.35;
    white-space: normal;
}

.med-table th {
    background-color: #a0bfe470;
    padding: 6px 10px;
    border: 1px solid #ddd;
    text-align: left;
    font-weight: 700;
    vertical-align: top;
}

.med-table td {
    padding: 6px 10px;
    border: 1px solid #ddd;
    text-align: left;
    vertical-align: top;
}

/* Chessboard pattern */
.med-table tbody tr:nth-child(odd) td:nth-child(odd),
.med-table tbody tr:nth-child(even) td:nth-child(even) {
    background-color: #e0ecfe8e;
}

.med-table tbody tr:nth-child(odd) td:nth-child(even),
.med-table tbody tr:nth-child(even) td:nth-child(odd) {
    background-color: #ffffff;
}

@media screen and (max-width: 600px) {
    .med-table {
        font-size: 14px;
    }

    .med-table th,
    .med-table td {
        padding: 5px 7px;
    }
}
</style>
</head>

<body>

<div class="table-wrapper">
<table class="med-table">
<thead>
<tr>
<th colspan="2">Discharge Medications</th>
</tr>
</thead>

<tbody>
<tr>
<th>Medication</th>
<th>Prescription</th>
</tr>
<tr>
<td>Aspirin</td>
<td>81 mg by mouth once daily</td>
</tr>
<tr>
<td>Ticagrelor</td>
<td>90 mg by mouth twice daily</td>
</tr>
<tr>
<td>Apixaban</td>
<td>5 mg by mouth twice daily</td>
</tr>
<tr>
<td>Carvedilol</td>
<td>6.25 mg by mouth twice daily</td>
</tr>
<tr>
<td>Atorvastatin</td>
<td>40 mg by mouth once daily</td>
</tr>
<tr>
<td>Losartan</td>
<td>50 mg by mouth once daily</td>
</tr>
</tbody>
</table>
</div>

</body>
</html>
